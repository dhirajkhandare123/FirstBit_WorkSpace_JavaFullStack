<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>
<link rel="stylesheet" href="style.css">

<style type="text/css">
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: Arial, sans-serif;
}

body {
	height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
	background: linear-gradient(135deg, #4a90e2, #6a11cb);
}

.login-container {
	width: 100%;
	display: flex;
	justify-content: center;
	align-items: center;
}

.login-box {
	background: #fff;
	padding: 40px;
	width: 350px;
	border-radius: 12px;
	box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
}

.login-box h2 {
	text-align: center;
	margin-bottom: 25px;
	color: #333;
}

.input-group {
	margin-bottom: 15px;
}

.input-group input {
	width: 100%;
	padding: 12px;
	border: 1px solid #ddd;
	border-radius: 6px;
	font-size: 16px;
}

.input-group input:focus {
	outline: none;
	border-color: #4a90e2;
}

button {
	width: 100%;
	padding: 12px;
	border: none;
	background: #4a90e2;
	color: white;
	font-size: 16px;
	border-radius: 6px;
	cursor: pointer;
	transition: 0.3s;
}

button:hover {
	background: #357abd;
}

.signup-link {
	text-align: center;
	margin-top: 15px;
	font-size: 14px;
}

.signup-link a {
	color: #4a90e2;
	text-decoration: none;
}
</style>
</head>
<body>

	<div class="login-container">
		<div class="login-box">
			<h2>Login</h2>

			<form action="login" method="GET">
				<div class="input-group">
					<input type="text" placeholder="Email" name="uname" required>
				</div>

				<div class="input-group">
					<input type="text" placeholder="Password" name="pass" required>
				</div>



				<button type="submit">Login</button>

				<p class="signup-link">
					Don't have an account? <a href="#">Sign Up</a>
				</p>
			</form>
		</div>
	</div>

</body>
</html>
