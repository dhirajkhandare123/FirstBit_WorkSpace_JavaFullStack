<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Form</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
    }

    .login-box{
      width: 350px;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .login-box h2{
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    .input-box{
      margin-bottom: 20px;
    }

    .input-box label{
      display: block;
      margin-bottom: 5px;
      color: #555;
    }

    .input-box input{
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      outline: none;
    }

    .input-box input:focus{
      border-color: #4facfe;
    }

    .btn{
      width: 100%;
      padding: 10px;
      background: #4facfe;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    .btn:hover{
      background: #008cdd;
    }

    .extra{
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .extra a{
      color: #4facfe;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Login</h2>

    <form action="login" method="post">
      <div class="input-box">
        <label>Email</label>
        <input type="text" placeholder="Enter your email" name="user" required>
      </div>

      <div class="input-box">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" name="pass" required>
      </div>

      <button type="submit" class="btn">Login</button>

      <div class="extra">
        Don't have an account?
        <a href="#">Register</a>
      </div>
    </form>
  </div>

</body>
</html>
